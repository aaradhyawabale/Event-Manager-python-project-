{% extends "base.html" %}
{% block title %}Create Event — CampusEvents{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7 col-md-9">

    <div class="d-flex align-items-center gap-2 mb-4">
      <a href="{{ url_for('admin_dashboard') }}" class="btn btn-sm btn-outline-secondary">
        <i class="bi bi-arrow-left"></i>
      </a>
      <h3 class="mb-0 fw-bold">Create New Event</h3>
    </div>

    <div class="card form-card shadow-sm">
      <div class="card-body p-4">

        <form action="{{ url_for('create_event') }}" method="POST">

          <!-- Title -->
          <div class="mb-3">
            <label for="title" class="form-label fw-medium">
              <i class="bi bi-type-h1 me-1"></i>Event Title
            </label>
            <input type="text" id="title" name="title"
                   class="form-control form-control-lg"
                   placeholder="e.g. Annual Tech Fest 2025" required/>
          </div>

          <!-- Description -->
          <div class="mb-3">
            <label for="description" class="form-label fw-medium">
              <i class="bi bi-card-text me-1"></i>Description
            </label>
            <textarea id="description" name="description"
                      class="form-control" rows="4"
                      placeholder="Brief description of the event..." required></textarea>
          </div>

          <!-- Date -->
          <div class="mb-3">
            <label for="date" class="form-label fw-medium">
              <i class="bi bi-calendar3 me-1"></i>Event Date
            </label>
            <input type="date" id="date" name="date"
                   class="form-control form-control-lg" required/>
          </div>

          <!-- Venue -->
          <div class="mb-4">
            <label for="venue" class="form-label fw-medium">
              <i class="bi bi-geo-alt me-1"></i>Venue
            </label>
            <input type="text" id="venue" name="venue"
                   class="form-control form-control-lg"
                   placeholder="e.g. Main Auditorium, Block A" required/>
          </div>

          <div class="d-grid gap-2">
            <button type="submit" class="btn btn-create btn-lg">
              <i class="bi bi-plus-circle me-1"></i> Create Event
            </button>
            <a href="{{ url_for('admin_dashboard') }}" class="btn btn-outline-secondary">
              Cancel
            </a>
          </div>

        </form>
      </div>
    </div>

  </div>
</div>
{% endblock %}
