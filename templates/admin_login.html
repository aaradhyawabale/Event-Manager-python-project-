{% extends "base.html" %}
{% block title %}Admin Login — CampusEvents{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
  <div class="col-md-5 col-lg-4">

    <div class="card admin-login-card shadow">
      <div class="card-body p-5">

        <!-- Icon + heading -->
        <div class="text-center mb-4">
          <div class="admin-lock-icon mx-auto mb-3">
            <i class="bi bi-shield-lock-fill"></i>
          </div>
          <h4 class="fw-bold">Admin Access</h4>
          <p class="text-muted small">Enter your credentials to manage events.</p>
        </div>

        <!-- Login Form -->
        <form action="{{ url_for('admin_login') }}" method="POST">

          <div class="mb-3">
            <label for="username" class="form-label fw-medium">
              <i class="bi bi-person-badge me-1"></i>Username
            </label>
            <input type="text" id="username" name="username"
                   class="form-control form-control-lg"
                   placeholder="admin" required autofocus/>
          </div>

          <div class="mb-4">
            <label for="password" class="form-label fw-medium">
              <i class="bi bi-key me-1"></i>Password
            </label>
            <input type="password" id="password" name="password"
                   class="form-control form-control-lg"
                   placeholder="••••••••" required/>
          </div>

          <div class="d-grid">
            <button type="submit" class="btn btn-admin-login btn-lg">
              <i class="bi bi-box-arrow-in-right me-1"></i> Login
            </button>
          </div>

        </form>

        <!-- Hint for demo -->
        <div class="demo-hint text-center mt-4">
          <small class="text-muted">
            Demo credentials: <code>admin</code> / <code>admin123</code>
          </small>
        </div>

      </div>
    </div>

    <div class="text-center mt-3">
      <a href="{{ url_for('index') }}" class="text-muted small">
        <i class="bi bi-arrow-left me-1"></i>Back to student view
      </a>
    </div>

  </div>
</div>
{% endblock %}
